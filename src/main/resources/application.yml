spring.application.name: devmix

logging:
  level:
    org.springframework.web.servlet: DEBUG

spring:
  sql:
    init:
      mode: always

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/board?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1034192713669-a401tuq5494md0572clkbn70ov12h3g2.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
          kakao:
            client-name: "board" #꼭 필요한가?
            client-id: 68a768c921c99a84fa9203ad53b6c90a
            client-secret: cz4aMP5TiLtZtsS9WkjGVadh2qByt3eK
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
          naver:
            client-id: rBP9ynsuMts_Vqqd3vCD #애플리케이션 정보의 Client ID
            client-secret: JyQFeeAbsu #애플리케이션 정보의 Client Secret
            redirect_uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: email
            client-name: Naver

        provider:
          kakao:
            authorization_uri: https://kauth.kakao.com/oauth/authorize
            token_uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user_name_attribute: id
          naver:
            authorization_uri: https://nid.naver.com/oauth2.0/authorize
            token_uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
jwt:
  issuer: dev-mix
  secret-key: dev-mix